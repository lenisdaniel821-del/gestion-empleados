<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/pagina2.css">
</head>
<body>
    <h1 class="titulo-pagina-1">GESTION DE EMPLEADOS </h1>

    <div class="contenedor-1">
        <!--esto es como los id para los empleados-->
        <h3 class="titulo-1">Agregar Empleado</h3>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ingresa el nombre">
        <label for="cargo">Cargo:</label>
        <input type="text" id="cargo" name="Cargo" placeholder="ingresa el cargo">
        <label for="text">Oficina:</label>
        <input type="text" name="Oficina" id="Oficina" placeholder="ingresa la officina">
        <label for="text">salario:</label>
        <input type="number" name="salario" id="salario" placeholder="ingresa el salario">
        <!--botones para cancelar y guardar el empleado-->
        <button class="boton-guardar-empleado">Guardar Empleado</button>
        <button class="boton-cancelar-empleado">Cancelar</button>
    </div>

    <div class="contenedor-2">
        <!-- esto es casi lo mismp pero guarda como los datos de los empelados y los pone como una lista-->
        <h3 class="titulo-2">Lista de Empleados</h3>
        <label for="Nombre">Nombre:</label>
        <input type="text">
        <label for="cargo">Cargo:</label>
        <input type="text">
        <label for="Oficina">Oficina:</label>
        <input type="text">
        <label for="Salario">Salario:</label>
        <input type="number">
    </div>
    
</body>
</html>
